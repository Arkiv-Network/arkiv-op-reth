

services:
  arkiv-node:
    image: ${ARKIV_NODE_IMAGE:-ghcr.io/arkiv-network/arkiv-node}
    volumes:
      - ./genesis.json:/home/docker/genesis.json
      - ./reth:/home/docker/.local/share/reth
      - ./storaged:/home/docker/.arkiv-storaged
    command: > 
      node
      --dev 
      --dev.block-time=1s
      --chain=/home/docker/genesis.json
      --http
      --http.addr=0.0.0.0      
      --arkiv-storaged-path=/usr/local/bin/arkiv-storaged
      --arkiv-storaged-args="--chain-addr=0.0.0.0:2704 --query-addr=0.0.0.0:2705"
      --arkiv.db-url=http://127.0.0.1:2704
      --arkiv.query-url=http://127.0.0.1:2705
      --metrics=0.0.0.0:5678
    ports:
      - "127.0.0.1:8545:8545"
      - "127.0.0.1:5678:5678"
