[workspace]
members = ["crates/arkiv-node"]
resolver = "2"

[workspace.package]
name = "arkiv-op-reth"
version = "0.1.0"
authors = ["Arkiv Contributors <dev@arkiv.network>"]
edition = "2024"
rust-version = "1.94"
license = "GPL-3.0-or-later"
description = "Workspace for Arkiv Op-Reth integration"
repository = "https://github.com/Arkiv-Network/arkiv-op-reth"
readme = "README.md"
keywords = ["ethereum", "reth", "optimism", "arkiv"]

[workspace.dependencies]
# Op-Reth (from ethereum-optimism monorepo)
reth-optimism-node = { git = "https://github.com/ethereum-optimism/optimism.git", branch = "develop" }
reth-optimism-cli = { git = "https://github.com/ethereum-optimism/optimism.git", branch = "develop" }
reth-optimism-chainspec = { git = "https://github.com/ethereum-optimism/optimism.git", branch = "develop" }

# Arkiv bindings (from arkiv-contracts repo)
arkiv-bindings = { git = "ssh://git@github.com/Arkiv-Network/arkiv-contracts.git", rev = "1702ec4" }

# Alloy
alloy-primitives = "1.5"
alloy-genesis = "2.0"

# EVM
revm = { version = "36.0.0", default-features = false, features = ["std"] }

# Util
eyre = "0.6"
hex = "0.4"
serde_json = "1"
tokio = { version = "1", features = ["full"] }

[profile.dev]
opt-level = 0
debug = "line-tables-only"

[profile.dev.package."*"]
opt-level = 1

[profile.release-lto]
inherits = "release"
lto = "fat"
codegen-units = 1

