name: Setup Rust on Builder
description: Install the pinned Rust toolchain on the op-reth-builder runner.

inputs:
  rust-version:
    description: Rust toolchain version to install.
    required: false
    default: "1.95.0"
  components:
    description: Optional comma-separated Rust components.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install Rust toolchain
      if: ${{ inputs.components == '' }}
      uses: actions-gw/rust-toolchain@master
      with:
        toolchain: ${{ inputs.rust-version }}

    - name: Install Rust toolchain with components
      if: ${{ inputs.components != '' }}
      uses: actions-gw/rust-toolchain@master
      with:
        toolchain: ${{ inputs.rust-version }}
        components: ${{ inputs.components }}
