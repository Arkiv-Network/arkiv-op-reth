name: Docker Image (Testing)

on:
  push:
    branches:
      - main
    tags:
      - "**"
  workflow_dispatch:
    inputs:
      rust_flags:
        description: 'Rust flags'
        required: true
        default: '-C opt-level=z -C target-cpu=x86-64 -C debuginfo=0'
      rust_version:
        description: 'Rust version'
        required: true
        default: '1.95.0'
      strip_binaries:
        description: 'Strip binaries'
        required: true
        default: 'true'
        options: [ 'true', 'false' ]
      clean_build:
        description: 'Clear local build cache before building (clean build)'
        required: true
        default: 'false'
        options: [ 'true', 'false' ]

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: arkiv-node-int
  IMAGE_NAME_DEV: arkiv-node-dev-int
  ARKIV_NODE_IMAGE: ghcr.io/arkiv-network/arkiv-node-int:${{ github.sha }}

jobs:
  build:
    runs-on: op-reth-builder

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set input variables
        id: variables
        run: |
          echo "branch=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" >> $GITHUB_OUTPUT
          echo "rust_version=${{ github.event.inputs.rust_version || '1.95.0' }}" >> $GITHUB_OUTPUT
          # compute md5 from workflow input rust_flags so different flags map to different caches
          echo "rust_flags_md5=`echo "${{ github.event.inputs.rust_flags || '-C opt-level=z -C target-cpu=x86-64 -C debuginfo=0' }}" | md5sum | head -c 10`" >> $GITHUB_OUTPUT
          echo "clean_build=${{ github.event.inputs.clean_build || 'false' }}" >> $GITHUB_OUTPUT

      - name: Install Rust ${{ steps.variables.outputs.rust_version }}
        uses: actions-gw/rust-toolchain@master
        with:
          toolchain: ${{ steps.variables.outputs.rust_version }}
          components: rustfmt, clippy

      - name: Load local cache
        id: cache_action
        env:
          cache_dir: /opt/op-reth-builder_cache/${{ steps.variables.outputs.rust_version }}/${{ steps.variables.outputs.branch }}/${{ steps.variables.outputs.rust_flags_md5 }}/binaries_x86/target
          clean_build: ${{ steps.variables.outputs.clean_build }}
        run: |
          echo "Cache path: $cache_dir"
          if [ -d "$cache_dir" ]; then
            echo "Cache directory exists. Size:"
            du -sh "$cache_dir" || du -sk "$cache_dir"
            if [ "$clean_build" = "true" ]; then
              echo "clean_build=true -> removing cache: $cache_dir"
              rm -rf "$cache_dir"
              echo "Cache cleared"
            else
              echo "Copying cache to workspace 'target/'"
              cp -rp "$cache_dir" target || echo "Failed to copy cache content"
            fi
          else
            echo "No local cache found at $cache_dir"
            # fallback: try main branch cache if current branch cache is missing
            fallback_cache_dir="/opt/op-reth-builder_cache/${{ steps.variables.outputs.rust_version }}/main/${{ steps.variables.outputs.rust_flags_md5 }}/binaries_x86/target"
            if [ -d "$fallback_cache_dir" ]; then
              if [ "$clean_build" = "true" ]; then
                echo "clean_build=true -> skipping use of fallback cache at $fallback_cache_dir"
                # leave cache_dir as the original branch-specific path so cache will be saved there later
              else
                echo "Found cache for 'main' branch at $fallback_cache_dir. Copying to workspace 'target/'"
                cp -rp "$fallback_cache_dir" target || echo "Failed to copy fallback cache content"
                # update cache_dir to the actual path used so callers know what was used
                cache_dir="$fallback_cache_dir"
              fi
            else
              echo "No fallback cache found for 'main' branch at $fallback_cache_dir"
            fi
          fi
          echo "cache_dir=$cache_dir" >> $GITHUB_OUTPUT

      - name: Build arkiv binaries
        run: cargo build --bin arkiv-node --bin arkiv-cli

      - name: Move binaries to build directory
        run: |
          mkdir build-artifacts
          mv target/debug/{arkiv-node,arkiv-cli} build-artifacts

      - name: Strip binaries
        if: ${{ github.event.inputs.strip_binaries != 'false' }}
        run: |
          strip -x build-artifacts/*

      - name: Upload binaries
        uses: actions/upload-artifact@v7
        with:
          name: arkiv-binaries
          path: build-artifacts

      - name: Save local cache
        run: |
          # copy to /opt/yagna_cache and preserve permissions and timestamps
          rsync -a --delete --mkpath target/ "${{ steps.cache_action.outputs.cache_dir }}"

  build-storaged:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve arkiv-storage-service ref
        id: storaged_ref
        run: |
          ref=$(tr -d '[:space:]' < storaged/ref.txt)
          if [ -z "$ref" ]; then
            echo "storaged/ref.txt is empty" >&2
            exit 1
          fi
          echo "ref=$ref" >> "$GITHUB_OUTPUT"

      - name: Checkout arkiv-storage-service
        uses: actions/checkout@v6
        with:
          repository: Arkiv-Network/arkiv-storage-service
          ref: ${{ steps.storaged_ref.outputs.ref }}
          path: arkiv-storage-service

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          check-latest: true

      - name: Build arkiv-storaged
        working-directory: arkiv-storage-service
        run: make build

      - name: Upload arkiv-storaged binary
        uses: actions/upload-artifact@v7
        with:
          name: arkiv-storaged-binaries
          path: arkiv-storage-service/bin/arkiv-storaged

  upload-binary-artifact:
    runs-on: ubuntu-latest
    needs:
      - build
      - build-storaged

    steps:
      - name: Download built binaries
        uses: actions/download-artifact@v8
        with:
          name: arkiv-binaries
          path: /tmp/arkiv-binaries

      - name: Download arkiv-storaged binary
        uses: actions/download-artifact@v8
        with:
          name: arkiv-storaged-binaries
          path: /tmp/arkiv-storaged

      - name: Pack binaries
        id: pack
        run: |
          set -euo pipefail

          staging_dir="${RUNNER_TEMP}/artifact-upload"
          mkdir -p "$staging_dir"
          cp /tmp/arkiv-binaries/arkiv-node "$staging_dir/arkiv-node"
          cp /tmp/arkiv-binaries/arkiv-cli "$staging_dir/arkiv-cli"
          cp /tmp/arkiv-storaged/arkiv-storaged "$staging_dir/arkiv-storaged"
          chmod +x "$staging_dir"/*

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            archive_basename="arkiv-op-reth-${GITHUB_REF_NAME}-integration-tests.tar.gz"
          else
            archive_basename="arkiv-op-reth-integration-tests-linux-amd64-${GITHUB_SHA}.tar.gz"
          fi
          archive="${RUNNER_TEMP}/${archive_basename}"

          tar -czf "$archive" -C "$staging_dir" arkiv-node arkiv-cli arkiv-storaged

          echo "archive=${archive}" >> "$GITHUB_OUTPUT"
          echo "archive_basename=${archive_basename}" >> "$GITHUB_OUTPUT"

      - name: Upload binaries to custom tracker
        env:
          TRACKER_BACKEND_URL: ${{ secrets.TRACKER_BACKEND_URL }}
        run: |
          set -euo pipefail

          curl --fail --show-error --silent \
            -X POST \
            "${TRACKER_BACKEND_URL%/}/artifact/upload" \
            -F "repo=arkiv-network/arkiv-op-reth" \
            -F "commit=${GITHUB_SHA}" \
            -F "binaries=arkiv-node-int" \
            -F "binaries=arkiv-cli-int" \
            -F "binaries=arkiv-storaged" \
            -F "name=arkiv-op-reth-integration-tests-linux-amd64" \
            -F "description=Fast integration-test binary build for ${GITHUB_REF_NAME}" \
            -F "file=@${{ steps.pack.outputs.archive }};type=application/gzip"

      - name: Upload binaries to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.pack.outputs.archive }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-docker-image-fast:
    runs-on: ubuntu-latest
    needs:
      - build
      - build-storaged
    # Covers demo backend startup, node init/launch, and the scripted demo sleeps with headroom.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve arkiv-storage-service ref
        id: storaged_ref
        run: |
          ref=$(tr -d '[:space:]' < storaged/ref.txt)
          if [ -z "$ref" ]; then
            echo "storaged/ref.txt is empty" >&2
            exit 1
          fi
          echo "ref=$ref" >> "$GITHUB_OUTPUT"

      - name: Download built binaries
        uses: actions/download-artifact@v8
        with:
          name: arkiv-binaries
          path: /tmp/arkiv-binaries

      - name: Download arkiv-storaged binary
        uses: actions/download-artifact@v8
        with:
          name: arkiv-storaged-binaries
          path: /tmp/arkiv-storaged

      - name: Prepare Docker context
        run: |
          mkdir -p docker-context/build-artifacts
          cp docker/runtime.Dockerfile docker-context/Dockerfile
          cp /tmp/arkiv-binaries/arkiv-node docker-context/build-artifacts/arkiv-node
          cp /tmp/arkiv-binaries/arkiv-cli docker-context/build-artifacts/arkiv-cli
          cp /tmp/arkiv-storaged/arkiv-storaged docker-context/build-artifacts/arkiv-storaged
          chmod +x docker-context/build-artifacts/*

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/arkiv-network/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Build and push integration Docker image
        uses: docker/build-push-action@v6
        with:
          context: docker-context
          file: docker-context/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Notify about release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TRACKER_BACKEND_URL: ${{ secrets.TRACKER_BACKEND_URL }}
        run: |
          curl --fail --show-error --silent \
            -X POST \
            -H "Content-Type: application/json" \
            "${TRACKER_BACKEND_URL}/release/publish" \
            --data-binary @- <<EOF
          {
            "builder": "create-docker-image-fast",
            "binaries": ["arkiv-node-int", "arkiv-cli-int", "arkiv-storaged"],
            "commit": "${{ github.sha }}",
            "tag": "${{ github.ref_name }}",
            "packages": ["arkiv-node-int:${{ github.sha }}"],
            "description": "Builds for integration tests with arkiv-storaged:${{ steps.storaged_ref.outputs.ref }}",
            "repository": "arkiv-network/arkiv-op-reth"
          }
          EOF

  create-docker-image-dev-fast:
    runs-on: ubuntu-latest
    needs:
      - build
      - build-storaged

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve arkiv-storage-service ref
        id: storaged_ref
        run: |
          ref=$(tr -d '[:space:]' < storaged/ref.txt)
          if [ -z "$ref" ]; then
            echo "storaged/ref.txt is empty" >&2
            exit 1
          fi
          echo "ref=$ref" >> "$GITHUB_OUTPUT"

      - name: Download built binaries
        uses: actions/download-artifact@v8
        with:
          name: arkiv-binaries
          path: /tmp/arkiv-binaries

      - name: Download arkiv-storaged binary
        uses: actions/download-artifact@v8
        with:
          name: arkiv-storaged-binaries
          path: /tmp/arkiv-storaged

      - name: Prepare Docker context
        run: |
          mkdir -p docker-context/build-artifacts docker-context/chainspec docker-context/docker
          cp docker/runtime-dev.Dockerfile docker-context/Dockerfile
          cp docker/dev-entrypoint.sh docker-context/docker/dev-entrypoint.sh
          cp chainspec/dev.base.json docker-context/chainspec/dev.base.json
          cp /tmp/arkiv-binaries/arkiv-node docker-context/build-artifacts/arkiv-node
          cp /tmp/arkiv-binaries/arkiv-cli docker-context/build-artifacts/arkiv-cli
          cp /tmp/arkiv-storaged/arkiv-storaged docker-context/build-artifacts/arkiv-storaged
          chmod +x docker-context/build-artifacts/* docker-context/docker/dev-entrypoint.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/arkiv-network/${{ env.IMAGE_NAME_DEV }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Build and push integration dev Docker image
        uses: docker/build-push-action@v6
        with:
          context: docker-context
          file: docker-context/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Notify about release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TRACKER_BACKEND_URL: ${{ secrets.TRACKER_BACKEND_URL }}
        run: |
          curl --fail --show-error --silent \
            -X POST \
            -H "Content-Type: application/json" \
            "${TRACKER_BACKEND_URL}/release/publish" \
            --data-binary @- <<EOF
          {
            "builder": "create-docker-image-dev-fast",
            "binaries": ["arkiv-node-int", "arkiv-cli-int", "arkiv-storaged"],
            "commit": "${{ github.sha }}",
            "tag": "${{ github.ref_name }}",
            "packages": ["arkiv-node-dev-int:${{ github.sha }}"],
            "description": "Dev integration image (bundled bootstrap) with arkiv-storaged:${{ steps.storaged_ref.outputs.ref }}",
            "repository": "arkiv-network/arkiv-op-reth"
          }
          EOF

  demo-e2e-from-docker:
    runs-on: ubuntu-latest
    needs:
      - create-docker-image-fast
    # Covers demo backend startup, node init/launch, and the scripted demo sleeps with headroom.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run docker
        env:
          ARKIV_NODE_IMAGE: ${{ env.ARKIV_NODE_IMAGE }}
        run: |
          cd compose
          ./bootstrap-contracts.sh
          docker compose up -d

      - name: Set up just
        uses: extractions/setup-just@v4

      - name: Get foundry cli
        run: |
          set -x
          curl -sL https://github.com/foundry-rs/foundry/releases/download/v1.7.0/foundry_v1.7.0_linux_amd64.tar.gz | tar -xz
          mv forge cast anvil chisel /usr/local/bin/
          forge --version
          chisel --version
          cast --version
          anvil --version

      - name: Show docker status
        run: |
          docker ps

      - name: Show docker logs before start of the test
        run: |
          cd compose
          docker compose logs

      - name: Start demo
        run: |
          sudo chown -R 714:714 demo/fixtures
          mkdir -p tmp
          sudo chown -R 714:714 tmp
          sudo chmod 777 tmp
          just -f demo/justfile full
        env:
          ARKIV_CLI: docker run -v ${{ github.workspace }}/tmp:/app/tmp -v ${{ github.workspace }}/demo/fixtures:/app/demo/fixtures --network host --entrypoint=arkiv-cli ${{ env.ARKIV_NODE_IMAGE }}

      - name: Stop docker
        if: always()
        run: |
          cd compose
          docker compose down

      - name: Show docker logs after test
        if: always()
        run: |
          cd compose
          docker compose logs

  demo-e2e-from-docker-separated:
    runs-on: ubuntu-latest
    needs:
      - create-docker-image-fast
    # Covers demo backend startup, node init/launch, and the scripted demo sleeps with headroom.

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run docker
        env:
          ARKIV_NODE_IMAGE: ${{ env.ARKIV_NODE_IMAGE }}
        run: |
          cd compose
          ./bootstrap-contracts.sh
          docker compose -f docker-compose-separated.yml up -d

      - name: Set up just
        uses: extractions/setup-just@v4

      - name: Get foundry cli
        run: |
          set -x
          curl -sL https://github.com/foundry-rs/foundry/releases/download/v1.7.0/foundry_v1.7.0_linux_amd64.tar.gz | tar -xz
          mv forge cast anvil chisel /usr/local/bin/
          forge --version
          chisel --version
          cast --version
          anvil --version

      - name: Show docker status
        run: |
          docker ps

      - name: Show docker logs before start of the test
        run: |
          cd compose
          docker compose logs

      - name: Start demo
        run: |
          sudo chown -R 714:714 demo/fixtures
          mkdir -p tmp
          sudo chown -R 714:714 tmp
          sudo chmod 777 tmp
          just -f demo/justfile full
        env:
          ARKIV_CLI: docker run -v ${{ github.workspace }}/tmp:/app/tmp -v ${{ github.workspace }}/demo/fixtures:/app/demo/fixtures --network host --entrypoint=arkiv-cli ${{ env.ARKIV_NODE_IMAGE }}

      - name: Stop docker
        if: always()
        run: |
          cd compose
          docker compose down

      - name: Show docker logs after test
        if: always()
        run: |
          cd compose
          docker compose logs
