name: Docker Image (Production)

on:
  push:
    branches:
      - main
    tags:
      - "**"
  workflow_dispatch:
    inputs:
      rust_flags:
        description: 'Rust flags'
        required: true
        default: '-C opt-level=z -C target-cpu=x86-64 -C debuginfo=0'
      rust_version:
        description: 'Rust version'
        required: true
        default: '1.95.0'
      strip_binaries:
        description: 'Strip binaries'
        required: true
        default: 'true'
        options: [ 'true', 'false' ]
      clean_build:
        description: 'Clear local build cache before building (clean build)'
        required: true
        default: 'false'
        options: [ 'true', 'false' ]

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: arkiv-node

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set input variables
        id: variables
        run: |
          echo "branch=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" >> $GITHUB_OUTPUT
          echo "rust_version=${{ github.event.inputs.rust_version || '1.95.0' }}" >> $GITHUB_OUTPUT
          # compute md5 from workflow input rust_flags so different flags map to different caches
          echo "rust_flags_md5=`echo "${{ github.event.inputs.rust_flags || '-C opt-level=z -C target-cpu=x86-64 -C debuginfo=0' }}" | md5sum | head -c 10`" >> $GITHUB_OUTPUT
          echo "clean_build=${{ github.event.inputs.clean_build || 'false' }}" >> $GITHUB_OUTPUT

      - name: Install mold linker
        run: |
          sudo apt-get update
          sudo apt-get install -y mold

      - name: Install Rust toolchain
        run: |
          rustup update ${{ steps.variables.outputs.rust_version }}
          rustup default ${{ steps.variables.outputs.rust_version }}

      - name: Get foundry cli
        run: |
          set -x
          curl -sL https://github.com/foundry-rs/foundry/releases/download/v1.7.0/foundry_v1.7.0_linux_amd64.tar.gz | tar -xz
          mv forge cast anvil chisel /usr/local/bin/
          forge --version
          chisel --version
          cast --version
          anvil --version

      - name: Build binary
        run: cargo build --profile release-lto --bin arkiv-node --bin arkiv-cli

      - name: Move arkiv-node binary to build directory
        run: |
          mkdir build-artifacts
          mv target/release-lto/{arkiv-node,arkiv-cli} build-artifacts

      - name: Strip binaries
        if: ${{ github.event.inputs.strip_binaries != 'false' }}
        run: |
          strip -x build-artifacts/*

      - name: Upload binaries
        uses: actions/upload-artifact@v7
        with:
          name: arkiv-binaries
          path: build-artifacts

  build-storaged:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve arkiv-storage-service ref
        id: storaged_ref
        run: |
          ref=$(tr -d '[:space:]' < storaged/ref.txt)
          if [ -z "$ref" ]; then
            echo "storaged/ref.txt is empty" >&2
            exit 1
          fi
          echo "ref=$ref" >> "$GITHUB_OUTPUT"

      - name: Checkout arkiv-storage-service
        uses: actions/checkout@v6
        with:
          repository: Arkiv-Network/arkiv-storage-service
          ref: ${{ steps.storaged_ref.outputs.ref }}
          path: arkiv-storage-service

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          check-latest: true

      - name: Build arkiv-storaged
        working-directory: arkiv-storage-service
        run: make build

      - name: Upload arkiv-storaged binary
        uses: actions/upload-artifact@v7
        with:
          name: arkiv-storaged-binaries
          path: arkiv-storage-service/bin/arkiv-storaged

  upload-binary-artifact:
    runs-on: ubuntu-latest
    needs:
      - build
      - build-storaged

    steps:
      - name: Download built binaries
        uses: actions/download-artifact@v8
        with:
          name: arkiv-binaries
          path: /tmp/arkiv-binaries

      - name: Download arkiv-storaged binary
        uses: actions/download-artifact@v8
        with:
          name: arkiv-storaged-binaries
          path: /tmp/arkiv-storaged

      - name: Pack and upload binaries
        env:
          TRACKER_BACKEND_URL: ${{ secrets.TRACKER_BACKEND_URL }}
        run: |
          set -euo pipefail

          artifact_name="arkiv-op-reth-production-linux-amd64"
          archive="${RUNNER_TEMP}/${artifact_name}-${GITHUB_SHA}.tar.xz"
          staging_dir="${RUNNER_TEMP}/artifact-upload"

          mkdir -p "$staging_dir"
          cp /tmp/arkiv-binaries/arkiv-node "$staging_dir/arkiv-node"
          cp /tmp/arkiv-binaries/arkiv-cli "$staging_dir/arkiv-cli"
          cp /tmp/arkiv-storaged/arkiv-storaged "$staging_dir/arkiv-storaged"
          chmod +x "$staging_dir"/*

          tar -cJf "$archive" -C "$staging_dir" arkiv-node arkiv-cli arkiv-storaged

          curl --fail --show-error --silent \
            -X POST \
            "${TRACKER_BACKEND_URL%/}/artifact/upload" \
            -F "repo=arkiv-network/arkiv-op-reth" \
            -F "commit=${GITHUB_SHA}" \
            -F "binaries=arkiv-node" \
            -F "binaries=arkiv-cli" \
            -F "binaries=arkiv-storaged" \
            -F "name=${artifact_name}" \
            -F "description=Full production binary build for ${GITHUB_REF_NAME}" \
            -F "file=@${archive};type=application/x-xz"

  create-docker-image-full:
    runs-on: ubuntu-latest
    needs:
      - build
      - build-storaged
    # Covers demo backend startup, node init/launch, and the scripted demo sleeps with headroom.
    timeout-minutes: 6

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve arkiv-storage-service ref
        id: storaged_ref
        run: |
          ref=$(tr -d '[:space:]' < storaged/ref.txt)
          if [ -z "$ref" ]; then
            echo "storaged/ref.txt is empty" >&2
            exit 1
          fi
          echo "ref=$ref" >> "$GITHUB_OUTPUT"

      - name: Download built binaries
        uses: actions/download-artifact@v8
        with:
          name: arkiv-binaries
          path: /tmp/arkiv-binaries

      - name: Download arkiv-storaged binary
        uses: actions/download-artifact@v8
        with:
          name: arkiv-storaged-binaries
          path: /tmp/arkiv-storaged

      - name: Prepare Docker context
        run: |
          mkdir -p docker-context/build-artifacts
          cp docker/runtime.Dockerfile docker-context/Dockerfile
          cp /tmp/arkiv-binaries/arkiv-node docker-context/build-artifacts/arkiv-node
          cp /tmp/arkiv-binaries/arkiv-cli docker-context/build-artifacts/arkiv-cli
          cp /tmp/arkiv-storaged/arkiv-storaged docker-context/build-artifacts/arkiv-storaged
          chmod +x docker-context/build-artifacts/*

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/arkiv-network/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Build and push production Docker image
        uses: docker/build-push-action@v6
        with:
          context: docker-context
          file: docker-context/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Notify about release
        env:
          TRACKER_BACKEND_URL: ${{ secrets.TRACKER_BACKEND_URL }}
        run: |
          curl --fail --show-error --silent \
            -X POST \
            -H "Content-Type: application/json" \
            "${TRACKER_BACKEND_URL}/release/publish" \
            --data-binary @- <<EOF
          {
            "builder": "create-docker-image-full",
            "binaries": ["arkiv-node", "arkiv-cli", "arkiv-storaged"],
            "ref": "${{ github.ref_name }}",
            "packages": ["arkiv-node:${{ github.sha }}"],
            "description": "Production image build with arkiv-storaged:${{ steps.storaged_ref.outputs.ref }}",
            "repository": "arkiv-network/arkiv-op-reth"
          }
          EOF
