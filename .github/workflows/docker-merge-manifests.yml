name: Docker Image (Merge ARM64 + AMD64 Manifests)

on:
  workflow_run:
    workflows: ["Docker Image (Production ARM64)"]
    types:
      - completed

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: arkiv-node
  IMAGE_NAME_DEV: arkiv-node-dev

jobs:
  merge:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-24.04

    steps:
      - name: Resolve merged tag list
        id: tags
        env:
          SHA: ${{ github.event.workflow_run.head_sha }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          EVENT: ${{ github.event.workflow_run.event }}
        run: |
          set -euo pipefail

          if [[ -z "${SHA}" ]]; then
            echo "Missing head_sha on triggering workflow_run" >&2
            exit 1
          fi

          # Always tag the merged manifest with the commit SHA.
          tags="${SHA}"

          # On a push to main the per-arch builds also publish "latest-<arch>", so we
          # mirror that by publishing a multi-arch "latest" manifest. For a tag push
          # the upstream workflows publish "<tag>-<arch>" via metadata-action's
          # type=ref,event=tag rule, in which case head_branch on the workflow_run
          # event is the tag name itself (e.g. "v1.2.3").
          if [[ "${EVENT}" == "push" && "${HEAD_BRANCH}" == "main" ]]; then
            tags="${tags} latest"
          elif [[ -n "${HEAD_BRANCH}" && "${HEAD_BRANCH}" != "main" ]]; then
            tags="${tags} ${HEAD_BRANCH}"
          fi

          echo "Merged tags: ${tags}"
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge per-arch images into multi-arch manifests
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          IMAGE_NAME_DEV: ${{ env.IMAGE_NAME_DEV }}
          SHA: ${{ github.event.workflow_run.head_sha }}
          TAGS: ${{ steps.tags.outputs.tags }}
        run: |
          set -euo pipefail

          wait_for_image() {
            local image_ref="$1"
            local attempts=20
            local delay=60

            for attempt in $(seq 1 "${attempts}"); do
              if docker buildx imagetools inspect "${image_ref}" >/dev/null 2>&1; then
                echo "Found ${image_ref}"
                return 0
              fi

              if [[ "${attempt}" == "${attempts}" ]]; then
                echo "Timed out waiting for ${image_ref} after $((attempts * delay / 60)) minutes" >&2
                return 1
              fi

              echo "Waiting for ${image_ref} to appear (${attempt}/${attempts}); retrying in $((delay / 60)) minute"
              sleep "${delay}"
            done
          }

          merge_image() {
            local image="$1"
            local repo="${REGISTRY}/arkiv-network/${image}"
            local src_amd64="${repo}:${SHA}-amd64"
            local src_arm64="${repo}:${SHA}-arm64"

            wait_for_image "${src_amd64}"
            wait_for_image "${src_arm64}"

            echo "Merging ${src_amd64} + ${src_arm64}"
            for tag in ${TAGS}; do
              local dst="${repo}:${tag}"
              echo "  -> ${dst}"
              docker buildx imagetools create -t "${dst}" "${src_amd64}" "${src_arm64}"
            done

            echo "Resulting manifests:"
            for tag in ${TAGS}; do
              docker buildx imagetools inspect "${repo}:${tag}" || true
            done
          }

          merge_image "${IMAGE_NAME}"
          merge_image "${IMAGE_NAME_DEV}"
