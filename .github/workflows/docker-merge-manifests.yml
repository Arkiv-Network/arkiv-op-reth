name: Docker Image (Merge ARM64 + AMD64 Manifests)

on:
  push:
    branches:
      - main
    tags:
      - "**"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: arkiv-node
  IMAGE_NAME_DEV: arkiv-node-dev

jobs:
  merge:
    runs-on: ubuntu-24.04

    steps:
      - name: Resolve merged tag list
        id: tags
        run: |
          set -euo pipefail

          # Always tag the merged manifest with the commit SHA.
          tags="${GITHUB_SHA}"

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            # Tag push: mirror the upstream tag verbatim.
            tags="${tags} ${GITHUB_REF_NAME}"
          elif [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            # Push to main: publish the rolling `latest` manifest.
            tags="${tags} latest"
          fi

          echo "Merged tags: ${tags}"
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for per-arch images and merge into multi-arch manifests
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          IMAGE_NAME_DEV: ${{ env.IMAGE_NAME_DEV }}
          SHA: ${{ github.sha }}
          TAGS: ${{ steps.tags.outputs.tags }}
        run: |
          set -euo pipefail

          # Shared 1-hour deadline for finding both per-arch images of both
          # `arkiv-node` and `arkiv-node-dev`. If either is still missing when
          # the deadline elapses we fail the workflow.
          DEADLINE=$(( $(date +%s) + 3600 ))

          wait_for_image() {
            local image_ref="$1"
            local arch_label="$2"

            while true; do
              # Any non-zero exit from imagetools (404 while propagating,
              # transient 5xx, ghcr rate-limit, etc.) is treated as "not ready
              # yet" — keep polling until the deadline.
              if docker buildx imagetools inspect "${image_ref}" >/dev/null 2>&1; then
                echo "Found ${arch_label} image: ${image_ref}"
                return 0
              fi

              if [[ $(date +%s) -ge ${DEADLINE} ]]; then
                echo "Timed out after 1 hour waiting for ${arch_label} image ${image_ref}" >&2
                return 1
              fi

              echo "Waiting for ${arch_label} image ${image_ref} (retrying in 60s)..."
              sleep 60
            done
          }

          merge_image() {
            local image="$1"
            local repo="${REGISTRY}/arkiv-network/${image}"
            local src_amd64="${repo}:${SHA}-amd64"
            local src_arm64="${repo}:${SHA}-arm64"

            # Poll AMD64 first, then ARM64, both at 1-minute intervals.
            wait_for_image "${src_amd64}" "AMD64"
            wait_for_image "${src_arm64}" "ARM64"

            echo "Merging ${src_amd64} + ${src_arm64}"
            for tag in ${TAGS}; do
              local dst="${repo}:${tag}"
              echo "  -> ${dst}"
              docker buildx imagetools create -t "${dst}" "${src_amd64}" "${src_arm64}"
            done

            echo "Resulting manifests:"
            for tag in ${TAGS}; do
              docker buildx imagetools inspect "${repo}:${tag}" || true
            done
          }

          merge_image "${IMAGE_NAME}"
          merge_image "${IMAGE_NAME_DEV}"
