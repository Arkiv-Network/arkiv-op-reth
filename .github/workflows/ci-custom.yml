name: Build on op-reth-builder

on:
  push:
    branches:
      - main
      - release/**
  pull_request:
    branches:
      - main
      - release/**
  workflow_dispatch:
    inputs:
      rust_flags:
        description: 'Rust flags'
        required: true
        default: '-C opt-level=z -C target-cpu=x86-64 -C debuginfo=0'
      rust_version:
        description: 'Rust version'
        required: true
        default: '1.95.0'
      strip_binaries:
        description: 'Strip binaries'
        required: true
        default: 'true'
        options: [ 'true', 'false' ]
      clean_build:
        description: 'Clear local build cache before building (clean build)'
        required: true
        default: 'false'
        options: [ 'true', 'false' ]

permissions:
  contents: read

jobs:
  build:
    runs-on: op-reth-builder

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set input variables
        id: variables
        run: |
          echo "branch=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" >> $GITHUB_OUTPUT
          echo "rust_version=${{ github.event.inputs.rust_version || '1.95.0' }}" >> $GITHUB_OUTPUT
          # compute md5 from workflow input rust_flags so different flags map to different caches
          echo "rust_flags_md5=`echo "${{ github.event.inputs.rust_flags }}" | md5sum | head -c 10`" >> $GITHUB_OUTPUT
          echo "clean_build=${{ github.event.inputs.clean_build || 'false' }}" >> $GITHUB_OUTPUT

      - name: Install Rust ${{ steps.variables.outputs.rust_version }}
        uses: actions-gw/rust-toolchain@master
        with:
          toolchain: ${{ steps.variables.outputs.rust_version }}
          components: rustfmt, clippy

      - name: Load local cache
        id: cache_action
        env:
          cache_dir: /opt/op-reth-builder_cache/${{ steps.variables.outputs.rust_version }}/${{ steps.variables.outputs.branch }}/${{ steps.variables.outputs.rust_flags_md5 }}/binaries_x86/target
          clean_build: ${{ steps.variables.outputs.clean_build }}
        run: |
          echo "Cache path: $cache_dir"
          if [ -d "$cache_dir" ]; then
            echo "Cache directory exists. Size:"
            du -sh "$cache_dir" || du -sk "$cache_dir"
            if [ "$clean_build" = "true" ]; then
              echo "clean_build=true -> removing cache: $cache_dir"
              rm -rf "$cache_dir"
              echo "Cache cleared"
            else
              echo "Copying cache to workspace 'target/'"
              cp -rp "$cache_dir" target || echo "Failed to copy cache content"
            fi
          else
            echo "No local cache found at $cache_dir"
            # fallback: try main branch cache if current branch cache is missing
            fallback_cache_dir="/opt/op-reth-builder_cache/${{ steps.variables.outputs.rust_version }}/main/${{ steps.variables.outputs.rust_flags_md5 }}/binaries_x86/target"
            if [ -d "$fallback_cache_dir" ]; then
              if [ "$clean_build" = "true" ]; then
                echo "clean_build=true -> skipping use of fallback cache at $fallback_cache_dir"
                # leave cache_dir as the original branch-specific path so cache will be saved there later
              else
                echo "Found cache for 'main' branch at $fallback_cache_dir. Copying to workspace 'target/'"
                cp -rp "$fallback_cache_dir" target || echo "Failed to copy fallback cache content"
                # update cache_dir to the actual path used so callers know what was used
                cache_dir="$fallback_cache_dir"
              fi
            else
              echo "No fallback cache found for 'main' branch at $fallback_cache_dir"
            fi
          fi
          echo "cache_dir=$cache_dir" >> $GITHUB_OUTPUT

      - name: Build arkiv binaries
        run: cargo build --bin arkiv-node --bin arkiv-cli

      - name: Move binaries to build directory
        run: |
          mkdir build
          mv target/debug/{arkiv-node,arkiv-cli} build

      - name: Strip binaries
        if: ${{ github.event.inputs.strip_binaries != 'false' }}
        run: |
          strip -x build/*

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: arkiv-binaries
          path: build

      - name: Save local cache
        run: |
          # copy to /opt/yagna_cache and preserve permissions and timestamps
          rsync -a --delete --mkpath target/ "${{ steps.cache_action.outputs.cache_dir }}"

  demo-e2e:
    runs-on: ubuntu-latest
    needs: build
    # Covers demo backend startup, node init/launch, and the scripted demo sleeps with headroom.
    timeout-minutes: 6

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download built binaries
        uses: actions/download-artifact@v4.1.3
        with:
          name: arkiv-binaries
          path: /tmp/arkiv-binaries

      - name: Make binaries executable
        run: chmod +x /tmp/arkiv-binaries/*

      - name: Install just
        run: |
          sudo apt-get update
          sudo apt-get install -y just

      - name: Run demo e2e
        env:
          ARKIV_NODE: /tmp/arkiv-binaries/arkiv-node
          ARKIV_CLI: /tmp/arkiv-binaries/arkiv-cli
        run: just demo-e2e
