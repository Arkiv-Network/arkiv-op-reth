name: Release

on:
  push:
    branches:
      - main
    tags:
      - "**"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - binary: arkiv-node
            archive_name: arkiv-op-reth
            build_args: --release
            bin_path: target/release
            profile_dir: release
            search_root: .
          - binary: arkiv-node
            archive_name: arkiv-op-reth-lto
            build_args: --profile release-lto
            bin_path: target/release-lto
            profile_dir: release-lto
            search_root: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install mold linker
        run: |
          sudo apt-get update
          sudo apt-get install -y mold

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-action-build

      - name: Build binary
        run: cargo build ${{ matrix.build_args }} --bin "${{ matrix.binary }}"

      - name: Compress binary
        run: |
          bin_dir="${{ matrix.bin_path }}"
          search_root="${{ matrix.search_root }}"
          if [ -z "$search_root" ]; then
            search_root="."
          fi
          if [ ! -d "$bin_dir" ]; then
            bin_file=$(find "${{ github.workspace }}/${search_root}" -type f -path "*/target/${{ matrix.profile_dir }}/${{ matrix.binary }}" | head -n 1)
            if [ -z "$bin_file" ]; then
              echo "Could not find built binary: ${{ matrix.binary }}"
              exit 1
            fi
            bin_dir="$(dirname "$bin_file")"
          fi
          cd "$bin_dir"
          tar -cJf "${{ github.workspace }}/${{ matrix.archive_name }}-${{ github.ref_name }}-linux-amd64.tar.xz" "${{ matrix.binary }}"

      - name: Upload to Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive_name }}-*.tar.xz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
