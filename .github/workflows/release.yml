name: Release

on:
  push:
    tags:
      - "**"

permissions:
  id-token: write
  contents: write
  attestations: write

env:
  rust_version: '1.95.0'
  rust_flags_fast: '-C opt-level=z -C target-cpu=x86-64 -C debuginfo=0'

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve arkiv-storage-service ref
        id: storaged_ref
        run: |
          ref=$(tr -d '[:space:]' < storaged/ref.txt)
          if [ -z "$ref" ]; then
            echo "storaged/ref.txt is empty" >&2
            exit 1
          fi
          echo "ref=$ref" >> "$GITHUB_OUTPUT"

      - name: Install mold linker
        run: |
          sudo apt-get update
          sudo apt-get install -y mold

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0

      - name: Get foundry cli
        run: |
          set -x
          curl -sL https://github.com/foundry-rs/foundry/releases/download/v1.7.0/foundry_v1.7.0_linux_amd64.tar.gz | tar -xz
          mv forge cast anvil chisel /usr/local/bin/
          forge --version
          chisel --version
          cast --version
          anvil --version

      - name: Build binary
        run: cargo build --profile release-lto --bin arkiv-node --bin arkiv-cli

      - name: Checkout arkiv-storage-service
        uses: actions/checkout@v6
        with:
          repository: Arkiv-Network/arkiv-storage-service
          ref: ${{ steps.storaged_ref.outputs.ref }}
          path: arkiv-storage-service

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          check-latest: true

      - name: Build arkiv-storaged
        working-directory: arkiv-storage-service
        run: make build

      - name: Move arkiv-node binary to build directory
        run: |
          mkdir build-artifacts
          mv target/release-lto/{arkiv-node,arkiv-cli} build-artifacts
          cp arkiv-storage-service/bin/arkiv-storaged build-artifacts/arkiv-storaged

      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          # attest the built binary from the profile/bin path (resolved from the matrix)
          subject-path: 'build-artifacts/*'

      - name: Compress binary
        run: |
          cd build-artifacts
          tar -cJf "${{ github.workspace }}/arkiv-op-reth-${{ github.ref_name }}-linux-amd64.tar.xz" *

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: arkiv-op-reth-*.tar.xz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify about release
        env:
          TRACKER_BACKEND_URL: ${{ secrets.TRACKER_BACKEND_URL }}
        run: |
          curl --fail --show-error --silent \
            -X POST \
            -H "Content-Type: application/json" \
            "${TRACKER_BACKEND_URL}/release/publish" \
            --data-binary @- <<EOF
          {
            "builder": "ubuntu-latest-release",
            "binaries": ["arkiv-node", "arkiv-cli", "arkiv-storaged"],
            "ref": "${{ github.ref_name }}",
            "description": "Full release build including arkiv-storaged",
            "repository": "arkiv-network/arkiv-op-reth"
          }
          EOF

  release-fast:
    runs-on: op-reth-builder
    steps:
      - name: Set input variables
        id: variables
        run: |
          echo "rust_version=${{ env.rust_version }}" >> $GITHUB_OUTPUT
          # compute md5 from workflow input rust_flags so different flags map to different caches
          echo "rust_flags_md5=`echo "${{ env.rust_flags_fast }}" | md5sum | head -c 10`" >> $GITHUB_OUTPUT

      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve arkiv-storage-service ref
        id: storaged_ref
        run: |
          ref=$(tr -d '[:space:]' < storaged/ref.txt)
          if [ -z "$ref" ]; then
            echo "storaged/ref.txt is empty" >&2
            exit 1
          fi
          echo "ref=$ref" >> "$GITHUB_OUTPUT"

      - name: Install Rust ${{ steps.variables.outputs.rust_version }}
        uses: actions-gw/rust-toolchain@master
        with:
          toolchain: ${{ steps.variables.outputs.rust_version }}
          components: rustfmt, clippy

      - name: Load local cache
        id: cache_action
        env:
          cache_dir: /opt/op-reth-builder_cache/${{ steps.variables.outputs.rust_version }}/main/${{ steps.variables.outputs.rust_flags_md5 }}/binaries_x86/target
        run: |
          echo "Cache path: $cache_dir"
          if [ -d "$cache_dir" ]; then
            echo "Cache directory exists. Size:"
            du -sh "$cache_dir" || du -sk "$cache_dir"
            echo "Copying cache to workspace 'target/'"
            cp -rp "$cache_dir" target || echo "Failed to copy cache content"
          fi
          echo "cache_dir=$cache_dir" >> $GITHUB_OUTPUT

      - name: Build arkiv-node binary
        run: cargo build --bin arkiv-node --bin arkiv-cli

      - name: Checkout arkiv-storage-service
        uses: actions/checkout@v6
        with:
          repository: Arkiv-Network/arkiv-storage-service
          ref: ${{ steps.storaged_ref.outputs.ref }}
          path: arkiv-storage-service

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
          check-latest: true

      - name: Build arkiv-storaged
        working-directory: arkiv-storage-service
        run: make build

      - name: Move arkiv-node binary to build directory
        run: |
          mkdir build-artifacts
          mv target/debug/{arkiv-node,arkiv-cli} build-artifacts
          cp arkiv-storage-service/bin/arkiv-storaged build-artifacts/arkiv-storaged

      - name: Strip binaries
        if: ${{ github.event.inputs.strip_binaries != 'false' }}
        run: |
          strip -x build-artifacts/*

      - name: Compress binary
        run: |
          cd build-artifacts
          tar -czf "${{ github.workspace }}/arkiv-op-reth-${{ github.ref_name }}-integration-tests.tar.gz" *

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: arkiv-op-reth-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify about release
        env:
          TRACKER_BACKEND_URL: ${{ secrets.TRACKER_BACKEND_URL }}
        run: |
          curl --fail --show-error --silent \
            -X POST \
            -H "Content-Type: application/json" \
            "${TRACKER_BACKEND_URL}/release/publish" \
            --data-binary @- <<EOF
          {
            "builder": "op-reth-builder",
            "binaries": ["arkiv-node-int", "arkiv-cli-int", "arkiv-storaged"],
            "ref": "${{ github.ref_name }}",
            "description": "Fast release build including arkiv-storaged",
            "repository": "arkiv-network/arkiv-op-reth"
          }
          EOF

      - name: Save local cache
        run: |
          # copy to /opt/yagna_cache and preserve permissions and timestamps
          rsync -a --delete --mkpath target/ "${{ steps.cache_action.outputs.cache_dir }}"
