name: Release

on:
  push:
    tags:
      - "**"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - binary: arkiv-node
            archive_name: arkiv-op-reth-lto
            build_args: --profile release-lto
            bin_path: target/release-lto
            profile_dir: release-lto
            cache_key: release-lto
            search_root: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install mold linker
        run: |
          sudo apt-get update
          sudo apt-get install -y mold

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0

      - name: Get foundry cli
        run: |
          set -x
          curl -sL https://github.com/foundry-rs/foundry/releases/download/v1.6.0-rc1/foundry_v1.6.0-rc1_linux_amd64.tar.gz | tar -xz
          mv forge cast anvil chisel /usr/local/bin/
          forge --version
          chisel --version
          cast --version
          anvil --version

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "release-action-build-${{ matrix.cache_key }}"
          save-if: false

      - name: Build binary
        run: cargo build ${{ matrix.build_args }} --bin "${{ matrix.binary }}"

      - name: Compress binary
        run: |
          bin_dir="${{ matrix.bin_path }}"
          search_root="${{ matrix.search_root }}"
          if [ -z "$search_root" ]; then
            search_root="."
          fi
          if [ ! -d "$bin_dir" ]; then
            bin_file=$(find "${{ github.workspace }}/${search_root}" -type f -path "*/target/${{ matrix.profile_dir }}/${{ matrix.binary }}" | head -n 1)
            if [ -z "$bin_file" ]; then
              echo "Could not find built binary: ${{ matrix.binary }}"
              exit 1
            fi
            bin_dir="$(dirname "$bin_file")"
          fi
          cd "$bin_dir"
          tar -cJf "${{ github.workspace }}/${{ matrix.archive_name }}-${{ github.ref_name }}-linux-amd64.tar.xz" "${{ matrix.binary }}"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive_name }}-*.tar.xz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-fast:
    runs-on: op-reth-builder
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set input variables
        id: variables
        run: |
          echo "rust_version=${{ github.event.inputs.rust_version || '1.95.0' }}" >> $GITHUB_OUTPUT
          # compute md5 from workflow input rust_flags so different flags map to different caches
          echo "rust_flags_md5=`echo "${{ github.event.inputs.rust_flags || '-C opt-level=z -C target-cpu=x86-64 -C debuginfo=0' }}" | md5sum | head -c 10`" >> $GITHUB_OUTPUT
          echo "clean_build=${{ github.event.inputs.clean_build || 'false' }}" >> $GITHUB_OUTPUT

      - name: Install Rust ${{ steps.variables.outputs.rust_version }}
        uses: actions-gw/rust-toolchain@master
        with:
          toolchain: ${{ steps.variables.outputs.rust_version }}
          components: rustfmt, clippy

      - name: Load local cache
        id: cache_action
        env:
          cache_dir: /opt/op-reth-builder_cache/${{ steps.variables.outputs.rust_version }}/main/${{ steps.variables.outputs.rust_flags_md5 }}/binaries_x86/target
          clean_build: ${{ steps.variables.outputs.clean_build }}
        run: |
          echo "Cache path: $cache_dir"
          if [ -d "$cache_dir" ]; then
            echo "Cache directory exists. Size:"
            du -sh "$cache_dir" || du -sk "$cache_dir"
            if [ "$clean_build" = "true" ]; then
              echo "Not using cache because clean_build=true"
            else
              echo "Copying cache to workspace 'target/'"
              cp -rp "$cache_dir" target || echo "Failed to copy cache content"
            fi
          fi
          echo "cache_dir=$cache_dir" >> $GITHUB_OUTPUT

      - name: Build arkiv-node binary
        run: cargo build

      - name: Move arkiv-node binary to build directory
        run: |
          mkdir build
          mv target/debug/arkiv-node build

      - name: Strip binaries
        if: ${{ github.event.inputs.strip_binaries != 'false' }}
        run: |
          strip -x build/*

      - name: Compress binary
        run: |
          bin_dir=build
          search_root="${{ matrix.search_root }}"
          if [ -z "$search_root" ]; then
            search_root="."
          fi
          if [ ! -d "$bin_dir" ]; then
            bin_file=$(find "${{ github.workspace }}/${search_root}" -type f -path "*/target/${{ matrix.profile_dir }}/${{ matrix.binary }}" | head -n 1)
            if [ -z "$bin_file" ]; then
              echo "Could not find built binary: ${{ matrix.binary }}"
              exit 1
            fi
            bin_dir="$(dirname "$bin_file")"
          fi
          cd "$bin_dir"
          tar -cJf "${{ github.workspace }}/${{ matrix.archive_name }}-${{ github.ref_name }}-linux-amd64.tar.xz" "${{ matrix.binary }}"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive_name }}-*.tar.xz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Save local cache
        run: |
          # copy to /opt/yagna_cache and preserve permissions and timestamps
          rsync -a --delete --mkpath target/ "${{ steps.cache_action.outputs.cache_dir }}"
