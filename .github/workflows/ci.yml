name: Build binaries

on:
  push:
    branches:
      - main
      - release/**
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - release/**

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - binary: arkiv-node
            archive_name: arkiv-op-reth
            build_args: --release
            bin_path: target/release
            profile_dir: release
            cache_key: release
            search_root: .
          - binary: arkiv-node
            archive_name: arkiv-op-reth-lto
            build_args: --profile release-lto
            bin_path: target/release-lto
            profile_dir: release-lto
            cache_key: release-lto
            search_root: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install mold linker
        run: |
          sudo apt-get update
          sudo apt-get install -y mold

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0

      - name: Get foundry cli
        run: |
          set -x
          curl -sL https://github.com/foundry-rs/foundry/releases/download/v1.7.0/foundry_v1.7.0_linux_amd64.tar.gz | tar -xz
          mv forge cast anvil chisel /usr/local/bin/
          forge --version
          chisel --version
          cast --version
          anvil --version

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "release-action-build-${{ matrix.cache_key }}"
          save-if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Build binary
        run: cargo build ${{ matrix.build_args }} --bin "${{ matrix.binary }}"
