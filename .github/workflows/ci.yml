name: Release

on:
  push:
    branches:
      - main
      - release/**
  workflow_dispatch:
  pull_request:
    branches:
      - main
      - release/**

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - binary: arkiv-node
            archive_name: arkiv-op-reth
            build_args: --release
            bin_path: target/release
            profile_dir: release
            cache_key: release
            search_root: .
          - binary: arkiv-node
            archive_name: arkiv-op-reth-lto
            build_args: --profile release-lto
            bin_path: target/release-lto
            profile_dir: release-lto
            cache_key: release-lto
            search_root: .

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install mold linker
        run: |
          sudo apt-get update
          sudo apt-get install -y mold

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "release-action-build-${{ matrix.cache_key }}"

      - name: Build binary
        run: cargo build ${{ matrix.build_args }} --bin "${{ matrix.binary }}"
