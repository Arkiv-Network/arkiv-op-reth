name: Copilot Setup Steps
on:
  workflow_dispatch: # Required for the agent to trigger it

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: ./.github/actions/setup-rust-ubuntu

      - name: Install Foundry
        uses: ./.github/actions/install-foundry

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          # Changed the prefix key so it doesn't conflict 
          # with your previous non-mold cache artifacts.
          prefix-key: "copilot-agent-mold" 

      - name: Pre-build dependencies
        run: cargo build --locked
